<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Create Admin Password</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='fifa.png') }}">
  <style>
    /* Global Styles */
    body {
      margin: 0;
      padding: 0;
      font-family: "Inter", "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #f2f5ff, #e6ecff);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 14px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
      text-align: center;
    }

    h2 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 1.6rem;
      color: #1f2937;
    }

    p {
      color: #6b7280;
      font-size: 0.95rem;
      line-height: 1.5;
      margin-bottom: 25px;
    }

    /* Input & Form Styling */
    input[type="password"] {
      width: 90%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      font-size: 1rem;
      transition: border-color 0.2s;
    }

    input[type="password"]:focus {
      outline: none;
      border-color: #2563eb;
    }

    button {
      margin-top: 10px;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background-color: #059669; /* Green to indicate "Creation/Setup" */
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: #047857;
    }

    .error {
      margin-top: 15px;
      color: #dc2626;
      font-size: 0.9rem;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>Crear Contraseña</h2>
    <p>Establecé la clave de acceso para el panel de administración. Se requerirá para todos los accesos futuros.</p>

    <form method="POST">
        <input type="password" name="password" placeholder="Nueva contraseña" required>
        <input type="password" name="confirm" placeholder="Confirmar contraseña" required>
        <button type="submit">Crear Administrador</button>
    </form>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
  </div>

</body>
</html>
