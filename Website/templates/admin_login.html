<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Admin Login</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='fifa.png') }}">

  <style>
    /* Consistent Background and Centering */
    body {
      margin: 0;
      padding: 0;
      font-family: "Inter", "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #f2f5ff, #e6ecff);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Compact Login Card */
    .card {
      background: white;
      padding: 40px;
      border-radius: 14px;
      width: 100%;
      max-width: 360px; /* Slimmer for single-input form */
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
      text-align: center;
    }

    h2 {
      margin-top: 0;
      margin-bottom: 25px;
      font-size: 1.6rem;
      color: #1f2937;
    }

    /* Input Styling */
    input[type="password"] {
      width: 90%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      font-size: 1rem;
      transition: border-color 0.2s;
    }

    input[type="password"]:focus {
      outline: none;
      border-color: #3b82f6;
    }

    /* Button Styling */
    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background-color: #1f2937; /* Darker color for Admin contrast */
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: #111827;
    }

    /* Error Message logic (consistent with profile page) */
    .error {
      margin-top: 15px;
      color: #dc2626;
      font-size: 0.9rem;
      font-weight: 500;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>Admin Login</h2>

    <form method="POST">
      <input type="password" name="password" placeholder="Contraseña de Administrador" required>
      <button type="submit">Ingresar</button>
    </form>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
  </div>

</body>
</html>
